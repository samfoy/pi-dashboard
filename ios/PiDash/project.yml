name: PiDash
options:
  bundleIdPrefix: com.sam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.sam.pidash
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: ""
    DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.0"
  NetworkImage:
    url: https://github.com/gonzalezreal/NetworkImage
    from: "6.0.0"

targets:
  PiDash:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PiDash
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PiDash/Assets.xcassets
    dependencies:
      - package: MarkdownUI
        product: MarkdownUI
      - package: NetworkImage
        product: NetworkImage
      - package: Highlightr
        product: Highlightr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.pidash
        INFOPLIST_FILE: PiDash/Info.plist
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: ""
